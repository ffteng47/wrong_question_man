name: wrong_answer_client
description: 错题本 — 本地 AI 驱动的错题管理工具
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 网络
  dio: ^5.4.3
  # 本地存储
  sqflite: ^2.3.3
  path_provider: ^2.1.3
  path: ^1.9.0
  # 图片
  camera: ^0.10.5+9
  image_picker: ^1.1.2
  image_cropper: ^7.1.0
  # Markdown + LaTeX
  flutter_markdown: ^0.7.3
  flutter_math_fork: ^0.7.2
  markdown: ^7.2.2
  # JSON 模型
  json_annotation: ^4.9.0
  # 工具
  uuid: ^4.4.2
  intl: ^0.19.0
  collection: ^1.18.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/
